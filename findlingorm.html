<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>找出所有lingorm！</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 95vw;
            overflow-x: auto;
            margin: 0 auto;           /* 水平居中 */
            display: block; 
        }
        h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .controls {
            margin-bottom: 15px;
        }
        .controls label {
            font-size: 16px;
            margin-right: 10px;
        }
        select, button {
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            background: #5a67d8;
        }
        .board {
            display: inline-grid;
            gap: 2px;
            background-color: #333;
            padding: 4px;
            margin: 10px auto;        /* 水平居中 */
            border-radius: 8px;
            justify-self: center;     /* 备用居中 */
        }
        .cell {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        .cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        .cell:hover {
            filter: brightness(0.95);
            transform: scale(0.98);
        }
        .cell.selected {
            outline: 3px solid gold;
            outline-offset: -2px;
            box-shadow: 0 0 0 2px rgba(255,215,0,0.5);
        }
        .cell.cow-correct {
            outline: 3px solid #ffd700;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .info-panel {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: inline-block;
            min-width: 300px;
        }
        .attempts {
            font-size: 24px;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }
        .attempts span {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
        }
        .message {
            font-size: 16px;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #e8f4f8;
            color: #2c3e50;
        }
        .legend {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
        .legend-item {
            display: inline-block;
            margin: 0 10px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        /* 自定义弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s;
        }
        .modal-content h3 {
            margin: 0 0 15px;
            font-size: 28px;
        }
        .modal-content p {
            margin: 10px 0 20px;
            font-size: 18px;
        }
        .modal-content button {
            padding: 8px 20px;
            font-size: 16px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 600px) {
            .cell {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎇 lingorm谜题 - 图片版 🎇</h2>
    <div class="controls">
        <label>棋盘大小 n = </label>
        <select id="sizeSelect">
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
        </select>
        <button id="newGameBtn">🔄 新游戏</button>
    </div>
    <div id="board" class="board"></div>
    <div class="info-panel">
        <div class="attempts">
            🎯 剩余试错机会: <span id="attemptsCount">3</span>
        </div>
        <div id="message" class="message">💡 单击标记✖️，双击验证（错误会消耗机会）</div>
        <div class="legend">
            <div class="legend-item">❌ = 验证错误（消耗机会）</div>
            <div class="legend-item">✖️ = 手动标记（不消耗机会）</div>
            <div class="legend-item">🔽 提示：每局有一个颜色只有一个格子，方便起步</div>
        </div>
    </div>
</div>

<!-- 自定义弹窗 -->
<div id="customModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <button id="modalCloseBtn">确定</button>
    </div>
</div>

<script>
    // ==================== 图片资源 ====================
    // 您可以替换这里的图片地址为您的本地或网络图片
    const COW_IMAGES = [
        "ling1.png",
        "ling2.png",
        "orm1.png",
        "orm2.png"
    ];
    // 确保图片可用，如果网络图片无法加载可替换为本地路径

    // ==================== 游戏状态 ====================
    let N = 5;
    let cowPositions = [];          // {row, col}
    let cowImagesMap = [];          // 每个对应的图片URL（按索引）
    let colorGrid = [];             // 颜色编号
    let playerChoices = [];         // 玩家最终选择（验证正确自动加入）
    let manualMarks = [];           // 手动标记的✖️
    let verifiedWrong = [];         // 双击验证错误的格子（❌）
    let verifiedCorrect = [];       // 双击验证正确的格子（存储行列）
    let attemptsLeft = 3;
    let gameActive = true;
    let selectedCell = null;

    // DOM 元素
    const sizeSelect = document.getElementById('sizeSelect');
    const newGameBtn = document.getElementById('newGameBtn');
    const attemptsSpan = document.getElementById('attemptsCount');
    const boardDiv = document.getElementById('board');
    const messageDiv = document.getElementById('message');
    const modal = document.getElementById('customModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // 显示自定义弹窗
    function showModal(title, message) {
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }
    modalCloseBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });

    // ==================== 核心生成算法 ====================
    function generateCows() {
        while (true) {
            let perm = [...Array(N).keys()];
            for (let i = perm.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [perm[i], perm[j]] = [perm[j], perm[i]];
            }
            let valid = true;
            for (let i = 0; i < N - 1; i++) {
                if (Math.abs(perm[i] - perm[i + 1]) < 2) {
                    valid = false;
                    break;
                }
            }
            if (valid) {
                return perm.map((col, row) => ({ row, col }));
            }
        }
    }

    // 为格子随机分配一张图片
    function assignCowImages(cows) {
        return cows.map(() => {
            const randomIndex = Math.floor(Math.random() * COW_IMAGES.length);
            return COW_IMAGES[randomIndex];
        });
    }

    function neighbors(row, col) {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        const res = [];
        for (let [dr, dc] of dirs) {
            let nr = row + dr, nc = col + dc;
            if (nr >= 0 && nr < N && nc >= 0 && nc < N) res.push([nr, nc]);
        }
        return res;
    }

    function generateColorRegions(cows, specialColor = 0) {
        let grid = Array(N).fill().map(() => Array(N).fill(-1));
        for (let i = 0; i < cows.length; i++) {
            let {row, col} = cows[i];
            grid[row][col] = i;
        }

        let queue = [];
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                if (grid[i][j] !== -1) {
                    if (grid[i][j] === specialColor) continue;
                    for (let [nr, nc] of neighbors(i, j)) {
                        if (grid[nr][nc] === -1 && !queue.some(p => p[0]===nr && p[1]===nc)) {
                            queue.push([nr, nc]);
                        }
                    }
                }
            }
        }

        while (queue.length) {
            let idx = Math.floor(Math.random() * queue.length);
            let [r, c] = queue[idx];
            queue.splice(idx, 1);

            let colorSet = new Set();
            for (let [nr, nc] of neighbors(r, c)) {
                if (grid[nr][nc] !== -1) colorSet.add(grid[nr][nc]);
            }
            if (colorSet.size === 0) continue;
            if (colorSet.has(specialColor)) colorSet.delete(specialColor);
            if (colorSet.size === 0) continue;

            let colors = Array.from(colorSet);
            let chosen = colors[Math.floor(Math.random() * colors.length)];
            grid[r][c] = chosen;

            for (let [nr, nc] of neighbors(r, c)) {
                if (grid[nr][nc] === -1 && !queue.some(p => p[0]===nr && p[1]===nc)) {
                    queue.push([nr, nc]);
                }
            }
        }

        // 填充剩余未着色格子（理论上不会，但保险）
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                if (grid[i][j] === -1) {
                    let neighborColors = [];
                    for (let [nr, nc] of neighbors(i, j)) {
                        if (grid[nr][nc] !== -1) neighborColors.push(grid[nr][nc]);
                    }
                    grid[i][j] = neighborColors.length ? neighborColors[0] : 0;
                }
            }
        }
        return grid;
    }

    // 检查胜利条件
    function checkWin() {
        let regionHasCow = new Array(N).fill(false);
        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                if (playerChoices[r][c]) {
                    let color = colorGrid[r][c];
                    if (regionHasCow[color]) return false;
                    regionHasCow[color] = true;
                }
            }
        }
        if (regionHasCow.some(v => !v)) return false;

        let rowCount = new Array(N).fill(0);
        let colCount = new Array(N).fill(0);
        let positions = [];
        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                if (playerChoices[r][c]) {
                    rowCount[r]++;
                    colCount[c]++;
                    positions.push([r, c]);
                }
            }
        }
        if (rowCount.some(v => v !== 1)) return false;
        if (colCount.some(v => v !== 1)) return false;

        for (let i = 0; i < positions.length; i++) {
            for (let j = i+1; j < positions.length; j++) {
                let dr = Math.abs(positions[i][0] - positions[j][0]);
                let dc = Math.abs(positions[i][1] - positions[j][1]);
                if (dr <= 1 && dc <= 1) return false;
            }
        }
        return true;
    }

    // 双击验证
    function onDoubleClick(e, row, col) {
        if (e) e.preventDefault();
        if (!gameActive) {
            showMessage("游戏已结束，请开始新游戏！", "error");
            return;
        }
        if (verifiedCorrect.some(pos => pos.row === row && pos.col === col)) {
            showMessage("这个格子已经确认有lingorm了！", "error");
            return;
        }
        if (verifiedWrong.some(pos => pos.row === row && pos.col === col)) {
            showMessage("这个格子已经确认没有lingorm了！", "error");
            return;
        }

        const cowIndex = cowPositions.findIndex(cow => cow.row === row && cow.col === col);
        const hasCow = cowIndex !== -1;

        if (hasCow) {
            verifiedCorrect.push({ row, col });
            // 自动加入玩家选择（移除同颜色区域的其他选择）
            const color = colorGrid[row][col];
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    if (playerChoices[r][c] && colorGrid[r][c] === color) {
                        playerChoices[r][c] = false;
                        break;
                    }
                }
            }
            playerChoices[row][col] = true;
            showMessage(`✅ 正确！格子 (${row+1},${col+1}) 有lingorm！`, "success");
            if (checkWin()) {
                gameActive = false;
                showModal("🎉 胜利！", "恭喜你找到所有lingorm，游戏胜利！");
                showMessage("🎉 胜利！ 🎉", "success");
            }
        } else {
            if (attemptsLeft <= 0) {
                showMessage("已经没有试错机会了！请开始新游戏。", "error");
                return;
            }
            attemptsLeft--;
            verifiedWrong.push({ row, col });
            showMessage(`❌ 错误！格子 (${row+1},${col+1}) 没有lingorm。剩余机会: ${attemptsLeft}`, "error");
            boardDiv.classList.add('shake');
            setTimeout(() => boardDiv.classList.remove('shake'), 300);
            if (attemptsLeft === 0) {
                gameActive = false;
                showModal("💀 失败", "试错机会用尽！游戏失败。点击新游戏继续挑战。");
                showMessage("💀 试错机会用尽！游戏失败。", "error");
            }
        }
        updateAttemptsDisplay();
        render();
    }

    // 单击手动标记
    function onSingleClick(row, col) {
        if (!gameActive) {
            showMessage("游戏已结束，请开始新游戏！", "error");
            return;
        }
        if (verifiedCorrect.some(pos => pos.row === row && pos.col === col)) {
            showMessage("这个格子已经确认有lingorm，不能标记", "error");
            return;
        }
        if (verifiedWrong.some(pos => pos.row === row && pos.col === col)) {
            showMessage("这个格子已经验证过没有lingorm，不能再标记", "error");
            return;
        }
        const index = manualMarks.findIndex(m => m.row === row && m.col === col);
        if (index === -1) {
            manualMarks.push({ row, col });
            showMessage(`✖️ 标记格子 (${row+1},${col+1}) 为无lingorm`, "info");
        } else {
            manualMarks.splice(index, 1);
            showMessage(`取消标记格子 (${row+1},${col+1})`, "info");
        }
        render();
    }

    // 双击/单击区分
    let clickTimer = null;
    let lastClick = { row: null, col: null, time: 0 };
    function onCellClick(e, row, col) {
        const now = Date.now();
        const timeDiff = now - lastClick.time;
        if (lastClick.row === row && lastClick.col === col && timeDiff < 300) {
            clearTimeout(clickTimer);
            onDoubleClick(e, row, col);
            lastClick = { row: null, col: null, time: 0 };
        } else {
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                onSingleClick(row, col);
                clickTimer = null;
            }, 300);
            lastClick = { row, col, time: now };
        }
        selectedCell = { row, col };
        render();
    }

    function showMessage(msg, type = "info") {
        messageDiv.textContent = msg;
        messageDiv.className = `message ${type}`;
        setTimeout(() => {
            if (messageDiv.textContent === msg) messageDiv.className = 'message';
        }, 2000);
    }

    function updateAttemptsDisplay() {
        attemptsSpan.textContent = attemptsLeft;
    }

    // 渲染网格，支持图片
    function render() {
        boardDiv.style.gridTemplateColumns = `repeat(${N}, 45px)`;
        boardDiv.innerHTML = '';
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const colorIdx = colorGrid[i][j];
                const hue = (colorIdx * 37) % 360;
                cell.style.backgroundColor = `hsl(${hue}, 70%, 70%)`;

                // 判断显示内容
                const isVerifiedCorrect = verifiedCorrect.some(p => p.row === i && p.col === j);
                const isVerifiedWrong = verifiedWrong.some(p => p.row === i && p.col === j);
                const isManualMark = manualMarks.some(p => p.row === i && p.col === j);
                const isPlayerChoice = playerChoices[i][j];

                if (isVerifiedCorrect) {
                    // 显示图片：找到对应lingorm的图片URL
                    const cowIndex = cowPositions.findIndex(cow => cow.row === i && cow.col === j);
                    const imgUrl = cowImagesMap[cowIndex];
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.alt = "🎇";
                    cell.appendChild(img);
                    cell.classList.add('cow-correct');
                } else if (isVerifiedWrong) {
                    cell.textContent = '❌';
                    cell.style.fontSize = '24px';
                } else if (isManualMark) {
                    cell.textContent = '✖️';
                    cell.style.fontSize = '24px';
                    cell.style.opacity = '0.7';
                } else if (isPlayerChoice) {
                    cell.textContent = '🎇';
                }

                if (selectedCell && selectedCell.row === i && selectedCell.col === j) {
                    cell.classList.add('selected');
                }
                if (!gameActive && !isVerifiedCorrect) {
                    cell.style.opacity = '0.6';
                    cell.style.cursor = 'not-allowed';
                }
                cell.addEventListener('click', (function(r, c) {
                    return function(e) {
                        if (gameActive || verifiedCorrect.some(p => p.row === r && p.col === c)) {
                            onCellClick(e, r, c);
                        } else {
                            showMessage("游戏已结束，请开始新游戏", "error");
                        }
                    };
                })(i, j));
                boardDiv.appendChild(cell);
            }
        }
    }

    // 重置游戏（根据当前 N）
    function resetGame() {
        N = parseInt(sizeSelect.value, 10);
        cowPositions = generateCows();
        cowImagesMap = assignCowImages(cowPositions);   // 为每个lingorm分配随机图片
        const singleColor = Math.floor(Math.random() * N);
        colorGrid = generateColorRegions(cowPositions, singleColor);
        playerChoices = Array(N).fill().map(() => Array(N).fill(false));
        manualMarks = [];
        verifiedWrong = [];
        verifiedCorrect = [];
        attemptsLeft = N - 2;
        gameActive = true;
        selectedCell = null;
        updateAttemptsDisplay();
        render();
        showMessage(`新游戏开始！n=${N}，剩余 ${attemptsLeft} 次试错机会。提示：颜色 ${singleColor+1} 只有一个格子。`, "success");
    }

    function newGame() {
        resetGame();
    }

    function changeSize() {
        resetGame();
    }

    sizeSelect.addEventListener('change', changeSize);
    newGameBtn.addEventListener('click', newGame);
    resetGame();
</script>
</body>
</html>
